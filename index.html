<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choral Rehearsal Portal</title>
    <style>
        :root {
            --bg-main: #f8f9fa;
            --bg-card: #ffffff;
            --bg-item: #f1f3f5;
            --bg-item-hover: #e9ecef;
            --accent-teal: #45a29e;
            --accent-teal-dark: #37827f;
            --text-main: #2b2b2b;
            --text-muted: #707070;
            --border-light: rgba(0, 0, 0, 0.08);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-main);
            color: var(--text-main);
            padding: 40px 20px;
            max-width: 1000px;
            margin: 0 auto;
            letter-spacing: -0.01em;
            -webkit-font-smoothing: antialiased;
        }

        h1 { 
            text-align: center; 
            color: var(--text-main); 
            margin-bottom: 5px; 
            font-size: 2.4em;
            font-weight: 400;
            letter-spacing: -0.03em;
        }
        
        .subtitle { 
            text-align: center; 
            color: var(--text-muted); 
            margin-bottom: 50px; 
            font-size: 0.9em; 
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 400;
        }
        
        .app-container {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 35px;
            align-items: start;
        }

        .sidebar-panel {
            background: var(--bg-card);
            padding: 24px;
            border-radius: 4px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
            border: 1px solid var(--border-light);
            max-height: 680px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        
        .sidebar-panel h3 { 
            margin-top: 0; 
            color: var(--text-main); 
            font-size: 0.95em;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid var(--border-light); 
            padding-bottom: 12px;
            margin-bottom: 16px;
            font-weight: 600;
        }

        /* Search Input Styling */
        .search-wrapper {
            margin-bottom: 16px;
        }

        .search-input {
            width: 100%;
            padding: 10px 12px;
            font-size: 0.9em;
            border-radius: 4px;
            border: 1px solid var(--border-light);
            background: var(--bg-main);
            color: var(--text-main);
            outline: none;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        .search-input:focus {
            border-color: var(--accent-teal);
            background: var(--bg-card);
        }
        
        .hymn-list { display: flex; flex-direction: column; gap: 8px; }
        
        .hymn-item {
            background: var(--bg-card);
            padding: 14px 16px;
            border-radius: 2px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid var(--border-light);
            color: var(--text-main);
            font-weight: 400;
            font-size: 0.95em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .hymn-item:hover { 
            background: var(--bg-item);
            border-color: rgba(0, 0, 0, 0.15);
        }
        
        .hymn-item.active { 
            background: var(--text-main); 
            color: #ffffff; 
            border-color: var(--text-main);
            font-weight: 500;
        }

        .player-panel { display: flex; flex-direction: column; gap: 20px; }
        
        .details-card {
            background: var(--bg-card);
            padding: 24px;
            border-radius: 4px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
            border: 1px solid var(--border-light);
            display: none;
        }

        .details-card h2 {
            margin: 0 0 12px 0;
            font-size: 1.8em;
            font-weight: 400;
            letter-spacing: -0.02em;
            color: var(--text-main);
        }

        .meta-grid {
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 6px 16px;
            font-size: 0.9em;
            border-bottom: 1px solid var(--border-light);
            padding-bottom: 14px;
            margin-bottom: 14px;
        }

        .meta-label {
            color: var(--text-muted);
            font-weight: 500;
            text-transform: uppercase;
            font-size: 0.8em;
            letter-spacing: 0.5px;
            padding-top: 2px;
        }

        .meta-value {
            color: var(--text-main);
        }

        .additional-info {
            font-size: 0.9em;
            color: var(--text-muted);
            line-height: 1.5;
            font-style: italic;
        }

        .master-panel {
            background: var(--bg-card);
            padding: 30px 24px;
            border-radius: 4px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
            border: 1px solid var(--border-light);
        }
        
        .playback-row { display: flex; align-items: center; gap: 0; margin-bottom: 25px; border: 1px solid var(--border-light); border-radius: 2px; overflow: hidden; }
        
        button {
            border: none;
            padding: 16px 32px;
            font-size: 0.95em;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            background: var(--bg-card);
            color: var(--text-main);
        }
        
        #playBtn { 
            background: var(--accent-teal); 
            color: white;
            flex-grow: 1; 
        }
        #playBtn:hover:not(:disabled) { 
            background: var(--accent-teal-dark); 
        }
        #playBtn:disabled, #stopBtn:disabled {
            background: var(--bg-item);
            color: var(--text-muted);
            cursor: not-allowed;
        }
        
        #stopBtn { 
            border-left: 1px solid var(--border-light);
            background: var(--bg-card);
        }
        #stopBtn:hover:not(:disabled) { 
            background: var(--bg-item); 
        }

        .time-display { 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            font-size: 1em; 
            color: var(--text-main); 
            padding: 0 20px;
            text-align: right; 
            font-weight: 400;
            background: var(--bg-card);
            align-self: stretch;
            display: flex;
            align-items: center;
            border-left: 1px solid var(--border-light);
        }
        
        .timeline-slider { 
            width: 100%; 
            height: 4px; 
            background: var(--bg-item); 
            border-radius: 2px; 
            outline: none; 
            cursor: pointer; 
            appearance: none;
            -webkit-appearance: none;
        }
        .timeline-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--text-main);
            transition: transform 0.1s;
        }
        .timeline-slider::-webkit-slider-thumb:hover { transform: scale(1.2); }
        .timeline-slider:disabled { opacity: 0.4; cursor: not-allowed; }

        .track-list { display: flex; flex-direction: column; gap: 12px; }
        
        .track-card {
            background: var(--bg-card);
            padding: 18px 24px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 24px;
            border: 1px solid var(--border-light);
            border-left: 4px solid var(--accent-teal);
            box-shadow: 0 2px 8px rgba(0,0,0,0.01);
        }
        
        .track-info { 
            width: 120px; 
            font-weight: 500; 
            color: var(--text-main);
            font-size: 0.95em;
            letter-spacing: 0.2px;
        }
        
        .fader-container { flex-grow: 1; display: flex; align-items: center; gap: 16px; }
        
        .volume-slider { 
            flex-grow: 1; 
            height: 4px; 
            background: var(--bg-item); 
            border-radius: 2px; 
            outline: none; 
            cursor: pointer;
            appearance: none;
            -webkit-appearance: none;
        }
        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--accent-teal);
            cursor: pointer;
        }
        .volume-slider::-webkit-slider-thumb:hover { background: var(--accent-teal-dark); }
        
        .vol-label { 
            font-family: inherit; 
            font-size: 0.9em; 
            color: var(--text-muted); 
            width: 40px; 
            text-align: right; 
        }

        @media (max-width: 800px) {
            .app-container { grid-template-columns: 1fr; gap: 20px; }
            .sidebar-panel { max-height: 340px; padding: 16px; }
            body { padding: 20px 15px; }
        }
    </style>
</head>
<body>

    <h1>Choral Rehearsal Portal</h1>
    <div class="subtitle">Multi-Track Mix Dashboard</div>

    <div class="app-container">
        <div class="sidebar-panel">
            <h3>Hymn Index</h3>
            <div class="search-wrapper">
                <input type="text" id="searchInput" class="search-input" placeholder="Search title or category...">
            </div>
            <div class="hymn-list" id="hymnListContainer"></div>
        </div>

        <div class="player-panel">
            <div id="detailsCard" class="details-card">
                <h2 id="metaTitle">Song Title</h2>
                <div class="meta-grid" id="metaGrid"></div>
                <div class="additional-info" id="metaInfo"></div>
            </div>

            <div id="audioElementsContainer"></div>

            <div class="master-panel">
                <div class="playback-row">
                    <button id="playBtn" disabled>Play</button>
                    <button id="stopBtn" disabled>Stop</button>
                    <div class="time-display" id="timeShow">0:00 / 0:00</div>
                </div>
                <input type="range" id="mainTimeline" class="timeline-slider" min="0" value="0" step="0.1" disabled>
            </div>

            <div class="track-list" id="mixerRackContainer"></div>
        </div>
    </div>

    <script>
        // CONFIGURATION PLAYLIST
        const library = [
            { 
                title: "As I Have Done", 
                folder: "hymns/As I Have Done", 
                tracks: ["soprano", "tenor"],
                tags: ["Offertory", "Holy Thursday"],
                lyricist: "John Ataco",
                composer: "Traditional",
                arranger: "David Willcocks",
                info: "Keep the tempo steady and emphasize the fluid transitions between the duet lines."
            },
            { 
                title: "He Leadeth Me", 
                folder: "hymns/He Leadeth Me",
                tags: ["Entrance", "General"],
                lyricist: "Joseph H. Gilmore",
                composer: "William B. Bradbury",
                info: "A historic 1862 standard hymn focused on trust and guiding faith."
            }
        ];

        const defaultTracks = ["soprano", "alto", "tenor", "bass"];

        const nameMap = {
            "soprano": "Soprano",
            "soprano2": "Soprano 2",
            "alto": "Alto",
            "alto2": "Alto 2",
            "tenor": "Tenor",
            "bass": "Bass",
            "descant": "Descant",
            "instruments": "Instruments"
        };

        library.sort((a, b) => a.title.localeCompare(b.title));

        const playBtn = document.getElementById('playBtn');
        const stopBtn = document.getElementById('stopBtn');
        const mainTimeline = document.getElementById('mainTimeline');
        const timeShow = document.getElementById('timeShow');
        const listContainer = document.getElementById('hymnListContainer');
        const audioContainer = document.getElementById('audioElementsContainer');
        const mixerRack = document.getElementById('mixerRackContainer');
        const searchInput = document.getElementById('searchInput');
        
        const detailsCard = document.getElementById('detailsCard');
        const metaTitle = document.getElementById('metaTitle');
        const metaGrid = document.getElementById('metaGrid');
        const metaInfo = document.getElementById('metaInfo');

        let activeTracks = [];
        let isPlaying = false;
        let isDragging = false;
        let syncInterval = null;

        function formatTime(secs) {
            if (isNaN(secs) || secs === Infinity) return "0:00";
            const m = Math.floor(secs / 60);
            const s = Math.floor(secs % 60);
            return `${m}:${s < 10 ? '0' : ''}${s}`;
        }

        function getActiveDuration() {
            const loadedTrack = activeTracks.find(t => t.duration && !isNaN(t.duration) && t.duration !== Infinity);
            return loadedTrack ? loadedTrack.duration : 0;
        }

        // Render Initial Playlist
        function renderPlaylist(hymnsToShow) {
            listContainer.innerHTML = '';
            hymnsToShow.forEach(hymn => {
                // Find original index inside primary configuration library array
                const originalIndex = library.findIndex(h => h.title === hymn.title);
                
                const item = document.createElement('div');
                item.className = 'hymn-item';
                item.textContent = hymn.title;
                
                // Keep visually highlighted active tracking states synced when filtering
                const currentlyActiveTitle = metaTitle.textContent;
                if (detailsCard.style.display === "block" && currentlyActiveTitle === hymn.title) {
                    item.classList.add('active');
                }
                
                item.onclick = () => selectHymn(originalIndex, item);
                listContainer.appendChild(item);
            });
        }

        // Live Real-Time Multi-Attribute Search Filtering Engine
        searchInput.addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase().trim();
            
            const filtered = library.filter(hymn => {
                const matchesTitle = hymn.title.toLowerCase().includes(searchTerm);
                
                // Check if any tags match the query string context safely
                const matchesTags = hymn.tags ? hymn.tags.some(t => t.toLowerCase().includes(searchTerm)) : false;
                
                return matchesTitle || matchesTags;
            });
            
            renderPlaylist(filtered);
        });

        function selectHymn(index, element) {
            activeTracks.forEach(t => { t.pause(); t.currentTime = 0; });
            if (syncInterval) clearInterval(syncInterval);
            
            isPlaying = false;
            playBtn.textContent = "Play";
            mainTimeline.value = 0;

            document.querySelectorAll('.hymn-item').forEach(i => i.classList.remove('active'));
            element.classList.add('active');

            const selected = library[index];
            
            detailsCard.style.display = "block";
            metaTitle.textContent = selected.title;
            metaGrid.innerHTML = ''; 
            
            const fields = [
                { label: "Words", value: selected.lyricist },
                { label: "Music", value: selected.composer },
                { label: "Arranger", value: selected.arranger },
                { label: "Category", value: selected.tags ? selected.tags.join(', ') : null }
            ];
            
            fields.forEach(field => {
                if (field.value) {
                    metaGrid.innerHTML += `
                        <div class="meta-label">${field.label}:</div>
                        <div class="meta-value">${field.value}</div>
                    `;
                }
            });
            
            if (selected.info) {
                metaInfo.style.display = "block";
                metaInfo.textContent = selected.info;
            } else {
                metaInfo.style.display = "none";
            }

            audioContainer.innerHTML = '';
            mixerRack.innerHTML = '';
            activeTracks = [];

            const tracksToUse = selected.tracks || defaultTracks;

            tracksToUse.forEach(trackName => {
                const cleanId = `audio-${trackName}`;
                
                const audioEl = document.createElement('audio');
                audioEl.id = cleanId;
                audioEl.preload = 'auto';
                audioEl.src = `${selected.folder}/${trackName}.mp3`;
                audioContainer.appendChild(audioEl);
                activeTracks.push(audioEl);

                const displayLabel = nameMap[trackName.toLowerCase()] || (trackName.charAt(0).toUpperCase() + trackName.slice(1));

                const trackCard = document.createElement('div');
                trackCard.className = 'track-card';
                
                trackCard.innerHTML = `
                    <div class="track-info">${displayLabel}</div>
                    <div class="fader-container">
                        <input type="range" class="volume-slider" data-track="${cleanId}" min="0" max="1" step="0.01" value="1">
                        <span class="vol-label" id="val-${cleanId}">100%</span>
                    </div>
                `;
                mixerRack.appendChild(trackCard);

                audioEl.addEventListener('loadedmetadata', () => {
                    const totalDur = getActiveDuration();
                    mainTimeline.max = totalDur;
                    if (!isPlaying) {
                        timeShow.textContent = `0:00 / ${formatTime(totalDur)}`;
                    }
                });
            });

            document.querySelectorAll('.volume-slider').forEach(slider => {
                slider.addEventListener('input', (e) => {
                    const audioId = e.target.dataset.track;
                    const liveAudio = document.getElementById(audioId);
                    const valPercent = Math.round(e.target.value * 100);
                    
                    if (liveAudio) liveAudio.volume = e.target.value;
                    document.getElementById(`val-${audioId}`).textContent = `${valPercent}%`;
                });
            });

            syncInterval = setInterval(() => {
                const activeTrack = activeTracks.find(t => !t.paused && t.currentTime > 0) || activeTracks.find(t => t.currentTime > 0);
                if (activeTrack && !isDragging) {
                    mainTimeline.value = activeTrack.currentTime;
                    timeShow.textContent = `${formatTime(activeTrack.currentTime)} / ${formatTime(getActiveDuration())}`;
                }
            }, 100);

            playBtn.disabled = false;
            stopBtn.disabled = false;
            mainTimeline.disabled = false;
            timeShow.textContent = "0:00 / 0:00";
        }

        playBtn.addEventListener('click', () => {
            if (!isPlaying) {
                activeTracks.forEach(t => t.play().catch(e => console.log("Engine sync notice:", e)));
                playBtn.textContent = "Pause";
                isPlaying = true;
            } else {
                activeTracks.forEach(t => t.pause());
                playBtn.textContent = "Play";
                isPlaying = false;
            }
        });

        stopBtn.addEventListener('click', () => {
            activeTracks.forEach(t => { t.pause(); t.currentTime = 0; });
            playBtn.textContent = "Play";
            isPlaying = false;
            mainTimeline.value = 0;
            timeShow.textContent = `0:00 / ${formatTime(getActiveDuration())}`;
        });

        mainTimeline.addEventListener('input', () => {
            isDragging = true;
            timeShow.textContent = `${formatTime(mainTimeline.value)} / ${formatTime(getActiveDuration())}`;
        });

        mainTimeline.addEventListener('change', () => {
            const targetTime = parseFloat(mainTimeline.value);
            activeTracks.forEach(t => t.currentTime = targetTime);
            isDragging = false;
        });

        // Initialize First Render Loop Sequence
        renderPlaylist(library);
    </script>
</body>
</html>
